name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check if release needed
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists — skipping release"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.check.outputs.skip == 'false'
        run: npm ci

      - if: steps.check.outputs.skip == 'false'
        run: npm test

      - name: Create tag and release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.check.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" --generate-notes

      - name: Update Homebrew formula
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ steps.check.outputs.tag }}"
          VERSION="${{ steps.check.outputs.version }}"
          TARBALL="https://github.com/elkidd/ai-blame/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$TARBALL" | sha256sum | cut -d' ' -f1)

          gh repo clone elkidd/homebrew-tap /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          sed -i "s|url \".*\"|url \"${TARBALL}\"|" Formula/gitai.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/gitai.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gitai.rb
          git commit -m "gitai ${VERSION}"
          git push
