name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve version
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG exists — bumping minor version"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            MINOR=$((MINOR + 1))
            VERSION="${MAJOR}.${MINOR}.0"
            TAG="v${VERSION}"
            node -e "
              const pkg = require('./package.json');
              pkg.version = '${VERSION}';
              require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package.json
            git commit -m "chore: bump version to ${VERSION}"
            git push
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG"

      - run: npm ci

      - run: npm test

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.check.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

          # Build changelog from commits since last tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "$TAG" | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" "$PREV_TAG..HEAD" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges)
          fi

          gh release create "$TAG" --title "$TAG" --notes "$CHANGELOG"

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ steps.check.outputs.tag }}"
          VERSION="${{ steps.check.outputs.version }}"
          TARBALL="https://github.com/elkidd/ai-blame/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$TARBALL" | sha256sum | cut -d' ' -f1)

          git clone https://x-access-token:${GH_TOKEN}@github.com/elkidd/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          sed -i "s|url \".*\"|url \"${TARBALL}\"|" Formula/gitai.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/gitai.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gitai.rb
          git commit -m "gitai ${VERSION}"
          git push
